<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Game</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="400"></canvas>
<script>
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');

const gridSize = 20;
const canvasWidth = canvas.width;
const canvasHeight = canvas.height;

var snake = [{x: 160, y: 240}, {x: 140, y: 240}, {x: 120, y: 240}];
var direction = 'RIGHT';
var food = {x: Math.floor(Math.random() * (canvasWidth / gridSize)) * gridSize, y: Math.floor(Math.random() * (canvasHeight / gridSize)) * gridSize};

function drawSnake() {
    ctx.fillStyle = 'lime';
    snake.forEach(segment => {
        ctx.fillRect(segment.x, segment.y, gridSize, gridSize);
    });
}

function drawFood() {
    ctx.fillStyle = 'red';
    ctx.fillRect(food.x, food.y, gridSize, gridSize);
}

function moveSnake() {
    var head = {x: snake[0].x, y: snake[0].y};

    switch (direction) {
        case 'RIGHT':
            head.x += gridSize;
            break;
        case 'LEFT':
            head.x -= gridSize;
            break;
        case 'UP':
            head.y -= gridSize;
            break;
        case 'DOWN':
            head.y += gridSize;
            break;
    }

    if (head.x === food.x && head.y === food.y) {
        food = {x: Math.floor(Math.random() * (canvasWidth / gridSize)) * gridSize, y: Math.floor(Math.random() * (canvasHeight / gridSize)) * gridSize};
    } else {
        snake.pop();
    }

    if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some((segment, index) => index > 0 && segment.x === head.x && segment.y === head.y)) {
        alert('Game Over!');
        document.location.reload();
    }

    snake.unshift(head);
}

function gameLoop() {
    ctx.clearRect(0, 0, canvasWidth, canvasHeight);
    drawSnake();
    drawFood();
    moveSnake();
}

setInterval(gameLoop, 100);

document.addEventListener('keydown', function(e) {
    switch (e.key) {
        case 'ArrowRight':
            if (direction !== 'LEFT'){
                direction = 'RIGHT';
            }
            break;
        case 'ArrowLeft':
            if (direction !== 'RIGHT'){
                direction = 'LEFT';
            }
            break;
        case 'ArrowUp':
            if (direction !== 'DOWN'){
                direction = 'UP';
            }
            break;
        case 'ArrowDown':
            if (direction !== 'UP'){
                direction = 'DOWN';
            }
            break;
    }
});
</script>
</body>
</html>
